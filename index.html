<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello India</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem 3rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 3.5rem;
      color: #2c3e50;
      margin-bottom: 1rem;
    }
    .flag {
      display: inline-block;
      margin-top: 1rem;
    }
    .flag span {
      display: inline-block;
      width: 10px;
      height: 20px;
    }
    .flag .saffron { background: #FF9933; }
    .flag .white { background: #FFFFFF; }
    .flag .green { background: #138808; }
    .flag .chakra {
      background: #000080;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      margin: 0 auto;
    }
    .subtitle {
      color: #7f8c8d;
      font-size: 1.2rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="flag">
      <span class="saffron"></span>
      <span class="white"></span>
      <span class="green"></span>
    </div>
    <h1>Hello India</h1>
    <p class="subtitle">Welcome to the land of diversity!</p>
  </div>
</body>
</html>
